# Upptime Configuration
# https://github.com/upptime/upptime
# Fork https://github.com/upptime/upptime into your GitHub account,
# then replace this file in your fork's root.

sites:
  - name: Vibe Coders Manual
    url: https://vibe-coders-manual.vercel.app
    __dangerous__enable_resolve_on_error: true
  - name: Client Account Management
    url: https://client-account-management.vercel.app
    __dangerous__enable_resolve_on_error: true
  - name: VDAB Deck
    url: https://cynthia-diane.vercel.app
    __dangerous__enable_resolve_on_error: true

status-website:
  baseUrl: /upptime
  name: Edgewise Status
  logoUrl: ""
  introTitle: "**Edgewise** service status"
  introMessage: "Uptime and response-time monitoring for Edgewise deployed applications."
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/ewlbasco/upptime

assignees:
  - ewlbasco

skipDeleteIssues: true

i18n:
  activeIncidents: Incidents actifs
  allSystemsOperational: Tous les systèmes opérationnels
  incidentReport: Rapport d'incident
  activeIncidentSummary: Résumé
  incidentBack: ← Retour
  pastIncidents: Incidents passés
  otherIncidents: Autres incidents
  up: Opérationnel
  degraded: Dégradé
  down: Hors ligne
  responseTimeGraph: Temps de réponse
  ms: ms
  responseTime: Temps de réponse
  duration: Durée
  statusPage: Statut
  liveStatus: Statut en direct
  rate: Taux
  incidentHistory: Historique des incidents

user-agent: ewlbasco

workflowSchedule:
  graphs: "0 0 * * *"
  responseTime: "0 23 * * *"
  staticSite: "0 1 * * *"
  summary: "0 0 * * *"
  updateTemplate: "0 0 * * *"
  updates: "0 3 * * *"
  uptime: "*/5 * * * *"
